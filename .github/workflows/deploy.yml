# Workflow de GitHub Actions para compilar y desplegar Lafabra en GitHub Pages
name: Desplegar en GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout de repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependencias
        run: |
          rm -f package-lock.json
          npm install --include=optional

      - name: Compilar SPA de producción
        run: npm run build

      - name: Configurar Páginas de GitHub
        uses: actions/configure-pages@v4

      - name: Subir artefacto estático de producción
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4