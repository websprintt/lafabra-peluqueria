# Workflow de GitHub Actions para compilar y desplegar Lafabra en GitHub Pages
name: Desplegar en GitHub Pages

on:
  push:
    branches:
      - main # Cambiar a master si la rama principal tiene ese nombre

# Establecer permisos necesarios para desplegar de forma segura en GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Permite cancelar compilaciones en curso de la misma rama para ahorrar recursos
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout de repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-size: 18 # Funciona perfecto en Node 18+
          node-version: 18
          cache: 'npm'

      - name: Instalar dependencias
        run: |
          # Evitamos el bug de npm #4828 con dependencias nativas instalando de forma flexible
          npm install

      - name: Compilar SPA de producción
        run: npm run build

      - name: Configurar Páginas de GitHub
        uses: actions/configure-pages@v4

      - name: Subir artefacto estático de producción
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Carpeta generada por la compilación de Vite

      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
